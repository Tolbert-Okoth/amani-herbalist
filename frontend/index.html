<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary Meta Tags (overridden per-page by react-helmet-async) -->
    <title>Fohow Eden Life | TCM Wholesale & Healthcare Portal Kenya</title>
    <meta name="title" content="Fohow Eden Life | TCM Wholesale & Healthcare Portal Kenya" />
    <meta name="description" content="Authorized Fohow distributor in Kenya. Premium Traditional Chinese Medicine (TCM) supplements for wholesale and clinical use. Partnering for ancient wisdom and modern vitality." />
    <meta name="keywords" content="Fohow Kenya, TCM Supplements, Traditional Chinese Medicine, Wholesale Healthcare Kenya, Eden Life, Fohow Products Nairobi, Herbal Medicine Kenya" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fohowedenlife.co.ke/" />
    <meta property="og:title" content="Fohow Eden Life | Ancient Wisdom for Modern Vitality" />
    <meta property="og:description" content="Access premium TCM formulas and wholesale clinic supplies from Kenya's authorized Fohow partner." />
    <meta property="og:image" content="https://fohowedenlife.co.ke/logo.png" />
    <meta property="og:site_name" content="Fohow Eden Life" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fohow Eden Life | Ancient Wisdom for Modern Vitality" />
    <meta name="twitter:description" content="Access premium TCM formulas and wholesale clinic supplies from Kenya's authorized Fohow partner." />
    <meta name="twitter:image" content="https://fohowedenlife.co.ke/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://fohowedenlife.co.ke/" />

    <!-- Performance Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD Organization Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Fohow Eden Life",
      "url": "https://fohowedenlife.co.ke",
      "logo": "https://fohowedenlife.co.ke/logo.png",
      "description": "Authorized Fohow distributor in Kenya. Premium Traditional Chinese Medicine supplements for wholesale and clinical use.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Nairobi",
        "addressRegion": "Nairobi",
        "addressCountry": "KE"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["English", "Swahili"]
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD WebSite with Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Fohow Eden Life",
      "url": "https://fohowedenlife.co.ke",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://fohowedenlife.co.ke/shop?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
